<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotizador - Servicios Académicos 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0f14;
    --surface: #14181f;
    --surface-hover: #1a1f29;
    --border: #252b37;
    --text: #e8eaf0;
    --text-muted: #8890a0;
    --accent-gold: #d4a853;
    --accent-gold-dim: rgba(212, 168, 83, 0.12);
    --accent-blue: #5b8def;
    --accent-blue-dim: rgba(91, 141, 239, 0.10);
    --accent-purple: #a78bfa;
    --accent-purple-dim: rgba(167, 139, 250, 0.10);
    --accent-emerald: #34d399;
    --accent-emerald-dim: rgba(52, 211, 153, 0.10);
    --accent-orange: #fb923c;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .grain { position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }

  .container { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 40px 24px 40px; }

  .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 13px; text-decoration: none; margin-bottom: 32px; transition: color 0.2s; }
  .back-link:hover { color: var(--accent-gold); }

  header { text-align: center; margin-bottom: 36px; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 800; margin-bottom: 10px; background: linear-gradient(135deg, #fff 30%, var(--accent-orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  header p { color: var(--text-muted); font-size: 15px; line-height: 1.6; }

  /* STEP SELECTOR */
  .step-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; }
  .step-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-gold); margin-bottom: 16px; }
  .step-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

  .option-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  .option-btn {
    padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .option-btn:hover { border-color: var(--accent-gold); color: var(--text); }
  .option-btn.selected { background: var(--accent-gold-dim); border-color: var(--accent-gold); color: var(--accent-gold); font-weight: 600; }

  .option-grid-3 { grid-template-columns: repeat(3, 1fr); }
  @media (max-width: 500px) { .option-grid-3 { grid-template-columns: 1fr; } }

  .plan-option { text-align: left; padding: 16px; }
  .plan-option .plan-name { font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .plan-option .plan-price { font-size: 12px; }
  .plan-option.selected .plan-name { color: var(--accent-gold); }

  /* CHAT */
  .chat-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    display: flex; flex-direction: column; min-height: 480px;
  }

  .chat-header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .chat-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-orange), var(--accent-gold));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: var(--bg);
  }
  .chat-header-info .chat-name { font-size: 14px; font-weight: 600; }
  .chat-header-info .chat-status { font-size: 11px; color: var(--accent-emerald); }

  .chat-messages {
    flex: 1; padding: 20px 24px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 16px;
    max-height: 400px;
  }

  .msg {
    max-width: 85%; padding: 14px 18px; border-radius: 16px;
    font-size: 14px; line-height: 1.55; animation: fadeUp 0.3s ease;
  }
  .msg.bot {
    align-self: flex-start; background: var(--surface-hover);
    border: 1px solid var(--border); border-bottom-left-radius: 4px;
  }
  .msg.user {
    align-self: flex-end; background: var(--accent-gold-dim);
    border: 1px solid rgba(212,168,83,0.2); border-bottom-right-radius: 4px;
    color: var(--accent-gold);
  }
  .msg.quote-result {
    align-self: flex-start; background: linear-gradient(135deg, rgba(52,211,153,0.08), rgba(167,139,250,0.06));
    border: 1px solid rgba(52,211,153,0.25); border-bottom-left-radius: 4px;
    max-width: 95%;
  }
  .msg .quote-price {
    font-family: 'Playfair Display', serif; font-size: 32px;
    font-weight: 800; color: var(--accent-emerald); margin: 12px 0;
  }
  .msg .quote-breakdown { margin-top: 12px; }
  .msg .quote-line {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
  }
  .msg .quote-line:last-child { border-bottom: none; }
  .msg .quote-line .ql-name { color: var(--text-muted); }
  .msg .quote-line .ql-pct { color: var(--text-muted); font-size: 11px; }
  .msg .quote-line .ql-price { color: var(--text); font-weight: 600; }
  .msg .quote-total {
    display: flex; justify-content: space-between;
    padding: 10px 0 0; margin-top: 8px;
    border-top: 2px solid rgba(52,211,153,0.3);
    font-weight: 700; font-size: 15px;
  }
  .msg .quote-total .qt-price { color: var(--accent-emerald); }

  .msg .wa-cta {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 14px; padding: 10px 20px; border-radius: 10px;
    background: #25d366; color: #fff; font-size: 13px; font-weight: 600;
    text-decoration: none; transition: background 0.2s;
  }
  .msg .wa-cta:hover { background: #20bd5a; }

  .typing-indicator { align-self: flex-start; display: flex; gap: 4px; padding: 14px 18px; }
  .typing-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted);
    animation: typingBounce 1.4s infinite ease-in-out;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  .chat-input-area {
    padding: 16px 20px; border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: flex-end;
  }
  .chat-input-area textarea {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    resize: none; min-height: 44px; max-height: 120px;
    outline: none; transition: border-color 0.2s;
  }
  .chat-input-area textarea:focus { border-color: var(--accent-gold); }
  .chat-input-area textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--accent-gold); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s; flex-shrink: 0;
  }
  .send-btn:hover { background: #e0b45f; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; fill: var(--bg); }

  .upload-area {
    border: 2px dashed var(--border); border-radius: 12px;
    padding: 20px; text-align: center; cursor: pointer;
    transition: all 0.2s; margin-bottom: 12px;
  }
  .upload-area:hover { border-color: var(--accent-gold); background: var(--accent-gold-dim); }
  .upload-area p { font-size: 13px; color: var(--text-muted); margin-top: 8px; }
  .upload-area .upload-icon { font-size: 28px; }
  .upload-area input { display: none; }

  .hidden { display: none !important; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
  <div class="grain"></div>
  <div class="container">
    <a href="tabla-precios-tesis.html" class="back-link">← Volver a planes</a>

    <header>
      <h1>Cotizador Parcial</h1>
      <p>Selecciona tu institución y plan, luego describe qué partes de tu tesis necesitas. Nuestra IA calculará tu cotización al instante.</p>
    </header>

    <!-- STEP 1: Institution -->
    <div class="step-section" id="step1">
      <div class="step-label">Paso 1</div>
      <div class="step-title">¿En qué tipo de institución estudias?</div>
      <div class="option-grid" id="instGrid">
        <button class="option-btn" data-value="cft">CFT</button>
        <button class="option-btn" data-value="ip">Instituto Profesional</button>
        <button class="option-btn" data-value="uni">Universidad (Pregrado)</button>
        <button class="option-btn" data-value="master">Magíster</button>
        <button class="option-btn" data-value="doc">Doctorado</button>
      </div>
    </div>

    <!-- STEP 2: Plan -->
    <div class="step-section hidden" id="step2">
      <div class="step-label">Paso 2</div>
      <div class="step-title">¿Qué plan te interesa?</div>
      <div class="option-grid option-grid-3" id="planGrid"></div>
    </div>

    <!-- STEP 3: Chat -->
    <div class="hidden" id="step3">
      <div class="chat-container">
        <div class="chat-header">
          <div class="chat-avatar">AI</div>
          <div class="chat-header-info">
            <div class="chat-name">Asistente de Cotización</div>
            <div class="chat-status">● En línea</div>
          </div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area" id="chatInputArea">
          <textarea id="chatInput" placeholder="Describe qué partes necesitas o pega tu estructura aquí..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn" onclick="handleSend()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // CONFIGURACIÓN
    // ============================================================
    const WA_NUMBER = '56912345678'; // <-- TU NÚMERO AQUÍ

    const PRICES = {
      cft:    { estandar: 60000, preferente: 100000, elite: 150000 },
      ip:     { estandar: 90000, preferente: 150000, elite: 225000 },
      uni:    { estandar: 150000, preferente: 250000, elite: 375000 },
      master: { estandar: 300000, preferente: 500000, elite: 750000 },
      doc:    { estandar: 500000, preferente: 850000, elite: 1250000 }
    };

    const INST_LABELS = {
      cft: 'CFT', ip: 'Instituto Profesional', uni: 'Universidad (Pregrado)',
      master: 'Magíster', doc: 'Doctorado'
    };

    const PLAN_LABELS = { estandar: 'Estándar', preferente: 'Preferente', elite: 'Élite' };

    // INTERNAL percentage table (hidden from user)
    const SECTION_PERCENTAGES = {
      "Introducción (planteamiento, objetivos, justificación)": 8,
      "Marco teórico / Revisión bibliográfica": 28,
      "Metodología": 17,
      "Resultados / Análisis": 28,
      "Conclusiones y recomendaciones": 8,
      "Bibliografía / Referencias": 5,
      "Anexos": 4,
      "Otros (resumen, abstract, portada, índice)": 2
    };

    let selectedInst = null;
    let selectedPlan = null;
    let conversationHistory = [];

    function formatCLP(n) { return '$' + Math.round(n).toLocaleString('es-CL'); }

    // STEP 1: Institution
    document.getElementById('instGrid').addEventListener('click', (e) => {
      const btn = e.target.closest('.option-btn');
      if (!btn) return;
      document.querySelectorAll('#instGrid .option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedInst = btn.dataset.value;
      showStep2();
    });

    function showStep2() {
      const s2 = document.getElementById('step2');
      s2.classList.remove('hidden');
      const grid = document.getElementById('planGrid');
      const p = PRICES[selectedInst];
      grid.innerHTML = ['estandar','preferente','elite'].map(k => `
        <button class="option-btn plan-option" data-value="${k}">
          <div class="plan-name">${PLAN_LABELS[k]}</div>
          <div class="plan-price">${formatCLP(p[k])}</div>
        </button>
      `).join('');

      grid.addEventListener('click', (e) => {
        const btn = e.target.closest('.option-btn');
        if (!btn) return;
        grid.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedPlan = btn.dataset.value;
        showStep3();
      });

      s2.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function showStep3() {
      document.getElementById('step3').classList.remove('hidden');
      const msgs = document.getElementById('chatMessages');
      msgs.innerHTML = '';
      conversationHistory = [];

      const totalPrice = PRICES[selectedInst][selectedPlan];
      const instLabel = INST_LABELS[selectedInst];
      const planLabel = PLAN_LABELS[selectedPlan];

      addBotMessage(`¡Perfecto! Has seleccionado <strong>${instLabel}</strong> con plan <strong>${planLabel}</strong> (${formatCLP(totalPrice)} tesis completa).\n\nAhora cuéntame: ¿qué partes de tu tesis necesitas? Puedes decirme algo como:\n\n• "Solo necesito el marco teórico y la metodología"\n• "Necesito todo menos la introducción"\n• O pega aquí la estructura o pauta de tu tesis y te cotizo las partes que indiques.`);

      document.getElementById('step3').scrollIntoView({ behavior: 'smooth', block: 'start' });
      document.getElementById('chatInput').focus();
    }

    function addBotMessage(html) {
      const msgs = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = 'msg bot';
      div.innerHTML = html;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function addUserMessage(text) {
      const msgs = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = 'msg user';
      div.textContent = text;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function addQuoteMessage(sections, totalPrice) {
      const msgs = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = 'msg quote-result';

      let totalPct = 0;
      let breakdownHTML = '';
      sections.forEach(s => {
        totalPct += s.pct;
        const sectionPrice = totalPrice * (s.pct / 100);
        breakdownHTML += `
          <div class="quote-line">
            <span class="ql-name">${s.name}</span>
            <span class="ql-pct">${s.pct}%</span>
            <span class="ql-price">${formatCLP(sectionPrice)}</span>
          </div>`;
      });

      const finalPrice = totalPrice * (totalPct / 100);
      const instLabel = INST_LABELS[selectedInst];
      const planLabel = PLAN_LABELS[selectedPlan];

      const waMsg = encodeURIComponent(`Hola, necesito una cotización parcial de tesis (${instLabel}, plan ${planLabel}). Secciones: ${sections.map(s => s.name).join(', ')}. Total estimado: ${formatCLP(finalPrice)}`);

      div.innerHTML = `
        <strong>📋 Tu cotización parcial</strong>
        <div class="quote-price">${formatCLP(finalPrice)}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">${instLabel} · Plan ${planLabel} · ${totalPct}% del total</div>
        <div class="quote-breakdown">${breakdownHTML}</div>
        <div class="quote-total">
          <span>Total estimado</span>
          <span class="qt-price">${formatCLP(finalPrice)}</span>
        </div>
        <a href="https://wa.me/${WA_NUMBER}?text=${waMsg}" target="_blank" class="wa-cta">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Confirmar por WhatsApp
        </a>
      `;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function showTyping() {
      const msgs = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = 'typing-indicator';
      div.id = 'typingIndicator';
      div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    // AUTO-RESIZE TEXTAREA
    const chatInput = document.getElementById('chatInput');
    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
    });
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
    });

    async function handleSend() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      input.style.height = 'auto';
      document.getElementById('sendBtn').disabled = true;

      addUserMessage(text);
      showTyping();

      const totalPrice = PRICES[selectedInst][selectedPlan];
      const instLabel = INST_LABELS[selectedInst];
      const planLabel = PLAN_LABELS[selectedPlan];

      // Build conversation for Claude
      conversationHistory.push({ role: 'user', content: text });

      const systemPrompt = `Eres un asistente de cotización de tesis académicas. Tu trabajo es analizar qué partes de una tesis necesita el cliente y calcular el precio parcial.

CONTEXTO:
- Institución: ${instLabel}
- Plan: ${planLabel}
- Precio total de tesis completa: ${formatCLP(totalPrice)} (${totalPrice} CLP)

TABLA INTERNA DE PORCENTAJES (úsala para calcular):
- Introducción (planteamiento, objetivos, justificación): 8%
- Marco teórico / Revisión bibliográfica: 28%
- Metodología: 17%
- Resultados / Análisis: 28%
- Conclusiones y recomendaciones: 8%
- Bibliografía / Referencias: 5%
- Anexos: 4%
- Otros (resumen, abstract, portada, índice): 2%

INSTRUCCIONES:
1. Analiza el mensaje del cliente para determinar qué secciones necesita.
2. Si el cliente es ambiguo, pregúntale exactamente qué secciones necesita. No inventes.
3. Cuando tengas claridad, responde SOLO con un JSON (sin texto adicional, sin backticks, sin markdown):

{"ready": true, "sections": [{"name": "Nombre de la sección", "pct": porcentaje_numerico}], "message": "Un breve mensaje amable confirmando lo que incluye"}

4. Si necesitas más información, responde SOLO con:

{"ready": false, "message": "Tu pregunta al cliente aquí"}

IMPORTANTE: Responde SOLO JSON puro, nada más. Sin backticks, sin explicaciones fuera del JSON.`;

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: systemPrompt,
            messages: conversationHistory
          })
        });

        const data = await response.json();
        hideTyping();

        const rawText = data.content.map(c => c.text || '').join('').trim();

        let parsed;
        try {
          // Clean potential markdown fences
          const clean = rawText.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
          parsed = JSON.parse(clean);
        } catch {
          // If not JSON, show as regular message
          addBotMessage(rawText);
          conversationHistory.push({ role: 'assistant', content: rawText });
          document.getElementById('sendBtn').disabled = false;
          return;
        }

        conversationHistory.push({ role: 'assistant', content: rawText });

        if (parsed.ready && parsed.sections) {
          addBotMessage(parsed.message);
          setTimeout(() => {
            addQuoteMessage(parsed.sections, totalPrice);
          }, 500);
        } else {
          addBotMessage(parsed.message);
        }

      } catch (err) {
        hideTyping();
        addBotMessage('Hubo un error al procesar tu solicitud. Por favor intenta de nuevo.');
        console.error(err);
      }

      document.getElementById('sendBtn').disabled = false;
    }
  </script>
</body>
</html>
