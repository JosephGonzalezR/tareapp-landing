name = "tareapp-cotizador"
main = "src/index.js"
compatibility_date = "2024-01-01"

# KV Namespace para rate limiting
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "b4925cd95bc34dec91a84b4e9f3f3895"

[vars]
ALLOWED_ORIGIN = "https://tareapp.ags-ed.com"
# Para testing local, cambiar temporalmente a "*"
# También puedes poner tu dominio personalizado

# Secrets (configurar con: wrangler secret put <NAME>)
# ANTHROPIC_API_KEY
# SUPABASE_URL
# SUPABASE_SERVICE_KEY
# RESEND_API_KEY
# ADMIN_EMAIL
